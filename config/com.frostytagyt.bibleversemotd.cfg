## Settings file was created by plugin Bible Verse MOTD v1.2.1
## Author: FrostyTagYT
## Plugin GUID: com.frostytagyt.bibleversemotd

[Display]

## Show a small header above each verse.
# Setting type: Boolean
# Default value: true
ShowHeader = true

## Header text shown above the Bible verse.
# Setting type: String
# Default value: Verse of the Day
HeaderText = Verse of the Day

[General]

## Replace the stump Message of the Day board with Bible verses.
# Setting type: Boolean
# Default value: true
Enabled = true

## Comma-separated PlayFab title data keys to replace. Use * for all MOTD boards.
# Setting type: String
# Default value: *
TitleDataKeys = *

## Log when the mod finds and replaces MOTD board text.
# Setting type: Boolean
# Default value: true
DebugLogging = false